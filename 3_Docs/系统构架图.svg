<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .layer-box { fill: #f8f9fa; stroke: #333; stroke-width: 2; stroke-dasharray: 5,5; }
    .node-box { fill: #fff; stroke: #2196f3; stroke-width: 2; rx: 8; }
    .hw-box { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; rx: 5; }
    .text-title { font-family: Arial; font-weight: bold; font-size: 16px; fill: #555; }
    .text-label { font-family: Arial; font-size: 14px; fill: #333; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>


  <!-- Layers -->
  <!-- Layer 1: Hardware -->
  <rect x="50" y="350" width="200" height="120" class="layer-box" />
  <text x="60" y="370" class="text-title">Field Layer (现场)</text>
  <rect x="70" y="380" width="70" height="30" class="hw-box" /><text x="105" y="400" class="text-label" font-size="12">Button</text>
  <rect x="160" y="380" width="70" height="30" class="hw-box" /><text x="195" y="400" class="text-label" font-size="12">Potentiometer</text>
  <rect x="70" y="420" width="70" height="30" class="hw-box" /><text x="105" y="440" class="text-label" font-size="12">Relay/Fan</text>
  <rect x="160" y="420" width="70" height="30" class="hw-box" /><text x="195" y="440" class="text-label" font-size="12">LED Ring</text>


  <!-- Layer 2: Edge Computing -->
  <rect x="300" y="350" width="180" height="120" class="node-box" style="stroke: #4caf50;" />
  <text x="390" y="380" class="text-label" font-weight="bold">ESP32 Gateway</text>
  <text x="390" y="405" class="text-label" font-size="12">- Signal Debouncing</text>
  <text x="390" y="425" class="text-label" font-size="12">- Local Closed-loop</text>
  <text x="390" y="445" class="text-label" font-size="12">- MQTT Client</text>


  <!-- Layer 3: Broker -->
  <rect x="300" y="200" width="180" height="80" class="node-box" style="fill: #e3f2fd;" />
  <text x="390" y="235" class="text-label" font-weight="bold">MQTT Broker</text>
  <text x="390" y="255" class="text-label" font-size="12">(EMQX Public)</text>


  <!-- Layer 4: Backend -->
  <rect x="550" y="200" width="180" height="120" class="node-box" />
  <text x="640" y="230" class="text-label" font-weight="bold">Python Backend</text>
  <text x="640" y="255" class="text-label" font-size="12">Flask + Socket.IO</text>
  <rect x="580" y="270" width="120" height="30" class="hw-box" style="stroke: #9c27b0;" />
  <text x="640" y="290" class="text-label" font-size="12">SQLite DB</text>


  <!-- Layer 5: Frontend -->
  <rect x="550" y="50" width="180" height="80" class="node-box" style="stroke: #ff5722;" />
  <text x="640" y="85" class="text-label" font-weight="bold">Web Dashboard</text>
  <text x="640" y="105" class="text-label" font-size="12">ECharts Visualization</text>


  <!-- Connections -->
  <!-- Field to Edge -->
  <path d="M250 410 L 300 410" class="arrow" />
  
  <!-- Edge to Broker (MQTT) -->
  <path d="M390 350 L 390 280" class="arrow" />
  <text x="340" y="320" font-size="11" fill="#666">MQTT (Pub/Sub)</text>


  <!-- Broker to Backend -->
  <path d="M480 240 L 550 240" class="arrow" />
  <text x="515" y="230" font-size="11" fill="#666">Subscribe</text>


  <!-- Backend to Frontend -->
  <path d="M640 200 L 640 130" class="arrow" />
  <text x="690" y="170" font-size="11" fill="#666">WebSocket</text>
  
  <!-- Local Loop (Curved) -->
  <path d="M 330 450 Q 300 480 360 480 Q 420 480 390 460" fill="none" stroke="red" stroke-width="2" stroke-dasharray="3,3" />
  <text x="360" y="495" font-size="11" fill="red">Closed-loop</text>


</svg>
